app = "kaoi-bot"
primary_region = "ord"

[build]

[env]
  NODE_ENV = "production"
  PORT = "4040"
  SESSION = "M_D"
  PREFIX = "!"
  NAME = "M_D BOT"

[http_service]
  internal_port = 4040
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
