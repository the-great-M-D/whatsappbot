services:
  - type: web
    name: M_D Bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"
      - key: NODE_ENV
        value: production
      - key: MONGODB_URL
        sync: false
      - key: SESSION
        value: M_D
      - key: PREFIX
        value: "!"
      - key: MODS
        sync: false
      - key: NAME
        value: M_D BOT
