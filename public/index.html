<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaoi WhatsApp Bot</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="dashboard">
        <div class="card">
            <div class="logo">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="16" fill="#25D366"/>
                    <path d="M23.5 8.5C21.7 6.7 19.3 5.7 16.7 5.7C11.3 5.7 6.9 10.1 6.9 15.5C6.9 17.3 7.4 19 8.2 20.5L6.8 25.3L11.7 23.9C13.2 24.7 14.9 25.1 16.7 25.1C22.1 25.1 26.5 20.7 26.5 15.3C26.3 12.7 25.3 10.3 23.5 8.5ZM16.7 23.5C15.1 23.5 13.5 23.1 12.1 22.3L11.8 22.1L9 22.9L9.8 20.2L9.6 19.9C8.7 18.4 8.3 16.7 8.3 15C8.3 10.8 11.8 7.3 16 7.3C18 7.3 19.9 8.1 21.3 9.5C22.7 10.9 23.5 12.8 23.5 14.8C23.7 19.2 20.2 23.5 16.7 23.5ZM20.2 17.1C19.9 16.9 18.5 16.2 18.3 16.1C18.1 16 17.9 15.9 17.7 16.2C17.5 16.5 17 17.1 16.8 17.3C16.6 17.5 16.5 17.5 16.2 17.4C15.9 17.3 14.9 16.9 13.8 16C12.9 15.2 12.3 14.2 12.1 13.9C11.9 13.6 12.1 13.5 12.3 13.3C12.4 13.2 12.6 13 12.8 12.8C13 12.6 13 12.5 13.1 12.3C13.2 12.1 13.1 11.9 13.1 11.8C13.1 11.7 12.5 10.3 12.3 9.8C12.1 9.3 11.9 9.4 11.8 9.4H11.3C11.1 9.4 10.8 9.5 10.6 9.8C10.4 10.1 9.7 10.8 9.7 12.2C9.7 13.6 10.6 14.9 10.8 15.2C11 15.5 12.5 17.8 14.8 19C15.4 19.3 15.9 19.5 16.3 19.7C16.9 19.9 17.5 19.9 18 19.8C18.6 19.7 19.7 19.1 19.9 18.4C20.2 17.7 20.2 17.2 20.1 17.1C20.1 17.2 20.2 17.1 20.2 17.1Z" fill="white"/>
                </svg>
            </div>

            <h1>Kaoi Bot</h1>
            <p class="subtitle">WhatsApp Bot Dashboard</p>

            <div id="status-badge" class="badge badge-waiting">
                <span class="dot"></span>
                <span id="status-text">Connecting...</span>
            </div>

            <div id="main-section">

                <!-- Phone input state -->
                <div id="phone-section">
                    <p class="section-label">Enter your WhatsApp number to get a pairing code</p>
                    <div class="phone-input-row">
                        <input id="phone-input" type="tel" placeholder="+27 81 234 5678" autocomplete="tel" />
                        <button id="pair-btn" onclick="requestPairCode()">Get Code</button>
                    </div>
                    <p id="pair-error" class="error-msg" style="display:none"></p>
                </div>

                <!-- Pairing code display state -->
                <div id="code-section" style="display:none">
                    <p class="section-label">Enter this code in WhatsApp</p>
                    <div id="code-display"></div>
                    <p class="code-hint">WhatsApp → <strong>Linked Devices</strong> → <strong>Link with phone number</strong></p>
                    <button class="try-again-btn" onclick="resetPairing()">Use a different number</button>
                </div>

                <!-- Connected state -->
                <div id="connected-section" style="display:none" class="connected-state">
                    <div class="check-circle">✓</div>
                    <p>Bot is connected to WhatsApp</p>
                    <p id="connected-user" class="connected-user"></p>
                </div>

            </div>

            <div id="refresh-bar">
                <span id="refresh-label">Checking status...</span>
            </div>
        </div>
    </div>

    <script>
        let pollTimer = null
        let countdownTimer = null
        let countdown = 5

        async function requestPairCode() {
            const input = document.getElementById('phone-input')
            const btn = document.getElementById('pair-btn')
            const errEl = document.getElementById('pair-error')
            const phone = input.value.trim()

            if (!phone) {
                showError('Please enter your phone number')
                return
            }

            btn.disabled = true
            btn.textContent = 'Requesting...'
            errEl.style.display = 'none'

            try {
                const res = await fetch('/api/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                })
                const data = await res.json()
                if (data.error) {
                    showError(data.error)
                    btn.disabled = false
                    btn.textContent = 'Get Code'
                    return
                }
                showPairCode(data.code)
            } catch (e) {
                showError('Failed to request code. Please try again.')
                btn.disabled = false
                btn.textContent = 'Get Code'
            }
        }

        function showError(msg) {
            const errEl = document.getElementById('pair-error')
            errEl.textContent = msg
            errEl.style.display = 'block'
        }

        function showPairCode(code) {
            document.getElementById('phone-section').style.display = 'none'
            document.getElementById('code-section').style.display = 'block'

            // Format code into groups: ABCD-EFGH
            const formatted = code.replace(/(.{4})(?=.)/g, '$1-').replace(/-$/, '')
            const parts = formatted.split('-')
            const display = document.getElementById('code-display')
            display.innerHTML = parts.map(p => `<span class="code-chunk">${p}</span>`).join('<span class="code-sep">-</span>')
        }

        function resetPairing() {
            document.getElementById('code-section').style.display = 'none'
            document.getElementById('phone-section').style.display = 'block'
            document.getElementById('phone-input').value = ''
            document.getElementById('pair-btn').disabled = false
            document.getElementById('pair-btn').textContent = 'Get Code'
        }

        async function poll() {
            try {
                const res = await fetch('/api/status')
                const status = await res.json()

                const badge = document.getElementById('status-badge')
                const statusText = document.getElementById('status-text')

                if (status.connected) {
                    badge.className = 'badge badge-connected'
                    statusText.textContent = 'Connected'
                    document.getElementById('phone-section').style.display = 'none'
                    document.getElementById('code-section').style.display = 'none'
                    document.getElementById('connected-section').style.display = 'flex'
                    if (status.user) document.getElementById('connected-user').textContent = '@' + status.user
                    document.getElementById('refresh-label').textContent = 'Bot is active'
                    clearInterval(countdownTimer)
                    return
                }

                badge.className = 'badge badge-waiting'
                statusText.textContent = 'Waiting for pairing...'

                // If server already has a code (e.g. after page refresh), show it
                if (status.pairCode && document.getElementById('phone-section').style.display !== 'none') {
                    showPairCode(status.pairCode)
                }

            } catch (e) {
                console.error('Poll error:', e)
            }

            startCountdown()
        }

        function startCountdown() {
            clearInterval(countdownTimer)
            countdown = 5
            document.getElementById('refresh-label').innerHTML = 'Refreshing in <span id="countdown">' + countdown + '</span>s'
            countdownTimer = setInterval(() => {
                countdown--
                const el = document.getElementById('countdown')
                if (el) el.textContent = countdown
                if (countdown <= 0) {
                    clearInterval(countdownTimer)
                    poll()
                }
            }, 1000)
        }

        document.getElementById('phone-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') requestPairCode()
        })

        poll()
    </script>
</body>
</html>
