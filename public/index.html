<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaoi WhatsApp Bot</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="dashboard">
        <div class="card">
            <div class="logo">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="16" fill="#25D366"/>
                    <path d="M23.5 8.5C21.7 6.7 19.3 5.7 16.7 5.7C11.3 5.7 6.9 10.1 6.9 15.5C6.9 17.3 7.4 19 8.2 20.5L6.8 25.3L11.7 23.9C13.2 24.7 14.9 25.1 16.7 25.1C22.1 25.1 26.5 20.7 26.5 15.3C26.3 12.7 25.3 10.3 23.5 8.5ZM16.7 23.5C15.1 23.5 13.5 23.1 12.1 22.3L11.8 22.1L9 22.9L9.8 20.2L9.6 19.9C8.7 18.4 8.3 16.7 8.3 15C8.3 10.8 11.8 7.3 16 7.3C18 7.3 19.9 8.1 21.3 9.5C22.7 10.9 23.5 12.8 23.5 14.8C23.7 19.2 20.2 23.5 16.7 23.5ZM20.2 17.1C19.9 16.9 18.5 16.2 18.3 16.1C18.1 16 17.9 15.9 17.7 16.2C17.5 16.5 17 17.1 16.8 17.3C16.6 17.5 16.5 17.5 16.2 17.4C15.9 17.3 14.9 16.9 13.8 16C12.9 15.2 12.3 14.2 12.1 13.9C11.9 13.6 12.1 13.5 12.3 13.3C12.4 13.2 12.6 13 12.8 12.8C13 12.6 13 12.5 13.1 12.3C13.2 12.1 13.1 11.9 13.1 11.8C13.1 11.7 12.5 10.3 12.3 9.8C12.1 9.3 11.9 9.4 11.8 9.4H11.3C11.1 9.4 10.8 9.5 10.6 9.8C10.4 10.1 9.7 10.8 9.7 12.2C9.7 13.6 10.6 14.9 10.8 15.2C11 15.5 12.5 17.8 14.8 19C15.4 19.3 15.9 19.5 16.3 19.7C16.9 19.9 17.5 19.9 18 19.8C18.6 19.7 19.7 19.1 19.9 18.4C20.2 17.7 20.2 17.2 20.1 17.1C20.1 17.2 20.2 17.1 20.2 17.1Z" fill="white"/>
                </svg>
            </div>

            <h1>Kaoi Bot</h1>
            <p class="subtitle">WhatsApp Bot Dashboard</p>

            <div id="status-badge" class="badge badge-waiting">
                <span class="dot"></span>
                <span id="status-text">Connecting...</span>
            </div>

            <div id="qr-section">
                <div id="qr-loading" class="qr-placeholder">
                    <div class="spinner"></div>
                    <p>Waiting for QR code...</p>
                </div>
                <div id="qr-image-wrap" style="display:none">
                    <img id="qr-img" src="" alt="WhatsApp QR Code" />
                    <p class="qr-hint">Open WhatsApp → Linked Devices → Link a Device</p>
                    <div id="pair-code-section" style="display:none; width:100%">
                        <div class="pair-divider"><span>or use pairing code</span></div>
                        <div class="pair-code-box">
                            <code id="pair-code-text"></code>
                            <button id="copy-btn" onclick="copyCode()">Copy</button>
                        </div>
                    </div>
                </div>
                <div id="qr-connected" style="display:none" class="connected-state">
                    <div class="check-circle">✓</div>
                    <p>Bot is connected to WhatsApp</p>
                    <p id="connected-user" class="connected-user"></p>
                </div>
            </div>

            <div id="refresh-bar">
                <span id="refresh-label">Refreshing in <span id="countdown">5</span>s</span>
            </div>
        </div>
    </div>

    <script>
        let countdown = 5
        let timer

        function copyCode() {
            const code = document.getElementById('pair-code-text').textContent
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.getElementById('copy-btn')
                btn.textContent = 'Copied!'
                setTimeout(() => btn.textContent = 'Copy', 2000)
            })
        }

        async function poll() {
            try {
                const statusRes = await fetch('/api/status')
                const status = await statusRes.json()

                const badge = document.getElementById('status-badge')
                const statusText = document.getElementById('status-text')
                const qrLoading = document.getElementById('qr-loading')
                const qrImageWrap = document.getElementById('qr-image-wrap')
                const qrConnected = document.getElementById('qr-connected')
                const qrImg = document.getElementById('qr-img')
                const connectedUser = document.getElementById('connected-user')

                if (status.connected) {
                    badge.className = 'badge badge-connected'
                    statusText.textContent = 'Connected'
                    qrLoading.style.display = 'none'
                    qrImageWrap.style.display = 'none'
                    qrConnected.style.display = 'flex'
                    if (status.user) connectedUser.textContent = '@' + status.user
                    document.getElementById('refresh-label').textContent = 'Bot is active'
                    return
                }

                badge.className = 'badge badge-waiting'
                statusText.textContent = 'Waiting for scan...'

                if (status.hasQR) {
                    qrLoading.style.display = 'none'
                    qrImageWrap.style.display = 'block'
                    qrImg.src = '/api/qr?t=' + Date.now()

                    // Fetch and show the raw pairing code text
                    try {
                        const qrTextRes = await fetch('/api/qr-text')
                        const qrTextData = await qrTextRes.json()
                        if (qrTextData.qrText) {
                            document.getElementById('pair-code-text').textContent = qrTextData.qrText
                            document.getElementById('pair-code-section').style.display = 'block'
                        }
                    } catch (e) { /* ignore */ }
                } else {
                    qrLoading.style.display = 'flex'
                    qrImageWrap.style.display = 'none'
                }
            } catch (e) {
                console.error('Poll error:', e)
            }

            startCountdown()
        }

        function startCountdown() {
            clearInterval(timer)
            countdown = 5
            document.getElementById('countdown').textContent = countdown
            document.getElementById('refresh-label').innerHTML = 'Refreshing in <span id="countdown">' + countdown + '</span>s'
            timer = setInterval(() => {
                countdown--
                const el = document.getElementById('countdown')
                if (el) el.textContent = countdown
                if (countdown <= 0) {
                    clearInterval(timer)
                    poll()
                }
            }, 1000)
        }

        poll()
    </script>
</body>
</html>
